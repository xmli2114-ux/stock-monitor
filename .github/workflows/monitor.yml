name: A股盯盘监控
on:
  schedule:
    - cron: '30 1,2,3,5,6 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests pandas
      - name: Run monitor
        env:
          DINGTALK_WEBHOOK: \${{ secrets.DINGTALK_WEBHOOK }}
        run: python monitor.py
