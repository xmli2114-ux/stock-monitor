name: A股盯盘监控

on:
  schedule:
    # 北京时间 09:30,10:00,10:30,11:00,13:00,13:30,14:00
    # UTC 01:30,02:00,02:30,03:00,05:00,05:30,06:00
    - cron: '30 1,2,3,5,6 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests pandas
      
      - name: 运行监控
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python monitor.py
