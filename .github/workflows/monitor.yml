name: A鑲＄洴鐩樼洃鎺?
on:
  schedule:
    # 鍖椾含鏃堕棿 09:30,10:00,10:30,11:00,13:00,13:30,14:00
    # UTC 鏃堕棿 01:30,02:00,02:30,03:00,05:00,05:30,06:00
    - cron: '30 1,2,3,5,6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '杩愯妯″紡'
        required: false
        default: 'normal'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 妫€鍑轰唬鐮?        uses: actions/checkout@v4
      
      - name: 璁剧疆 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 瀹夎渚濊禆
        run: pip install -r requirements.txt akshare requests pandas
      
      - name: 杩愯鐩戞帶
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          echo "=== 寮€濮嬬洴鐩樻鏌?$(date) ==="
          python monitor.py
